# Optional Qwen fast-lane LiteLLM config.
#
# Use only after the llama.cpp benchmark beats the current Ollama path.
# Public model contract remains qwen3.6-27b-local; if the llama.cpp server is
# down or unstable, LiteLLM falls back to qwen3.6-27b-ollama.

model_list:
  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: qwen3.6-27b-local
    litellm_params:
      model: openai/qwen3.6-27b-local
      api_base: http://localhost:8081/v1
      api_key: sk-noop

  - model_name: qwen3.6-27b-ollama
    litellm_params:
      model: ollama_chat/qwen3.6:27b
      api_base: http://localhost:11434

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

litellm_settings:
  fallbacks:
    - gpt-5.4-mini: ["gpt-4o-mini", "qwen3.6-27b-local"]
    - gpt-4o-mini: ["qwen3.6-27b-local"]
    - qwen3.6-27b-local: ["qwen3.6-27b-ollama"]
  num_retries: 1
  request_timeout: 600
  drop_params: true

general_settings:
  store_model_in_db: false
