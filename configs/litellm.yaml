# LiteLLM proxy config for J.A.R.V.I.S.
#
# Purpose: shield JARVIS from OpenAI rate-limit blocks. Same OpenAI-compatible
# endpoint contract; LiteLLM transparently retries and falls back to the next
# tier in the chain when an upstream returns 429 / 5xx / timeout.
#
# Boot via:   uv run litellm --config configs/litellm.yaml --port 4000
# Health:     curl http://localhost:4000/health/liveliness
# Used by:    JARVIS reads OPENAI_BASE_URL=http://localhost:4000 (set in
#             jarvis.bat). The OpenAI client respects it; zero code change
#             in the JARVIS Python source.
#
# Chain (when JARVIS asks for `gpt-5.4-mini`):
#   1. gpt-5.4-mini   (OpenAI direct — current production model)
#   2. gpt-4o-mini    (OpenAI cheaper fallback — different cost tier, often
#                      separate quota bucket)
#   3. qwen3.6:27b via WSL MTP/Froggeric (local RTX 4090 fast lane)
#   4. qwen3.6:27b via BeeLlama DFlash (local safety fallback)
#   5. qwen3.6:27b via Ollama (local last-resort fallback)
#
# Anthropic skipped 2026-05-09 (no API key on box; CLAUDE_CODE_PROVIDER_MANAGED_BY_HOST
# uses the subscription, not API). Add when an Anthropic API key is provisioned.

model_list:
  # Primary — what JARVIS actually requests
  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  # Fallback tier 1 — different OpenAI model, often a separate quota bucket
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Fallback tier 2 — local WSL MTP/Froggeric fast lane. Never rate-limited.
  # Benchmarked 2026-05-26 on RTX 4090, isolated on GPU:
  # ~52-72 t/s for 256-token Studio planning prompts. Do not co-run with
  # BeeLlama during benchmarks; they contend for the same GPU.
  - model_name: qwen3.6-27b-local
    litellm_params:
      model: openai/qwen3.6-27b-local
      api_base: http://localhost:8084/v1
      api_key: sk-noop

  # Local fallback if the WSL MTP lane is not started or proves unstable.
  - model_name: qwen3.6-27b-beellama
    litellm_params:
      model: openai/qwen3.6-27b-local
      api_base: http://localhost:8082/v1
      api_key: sk-noop

  # Optional Studio quality lane. If the dedicated quality server on 8083 is
  # not running, LiteLLM falls through to the live local/backup routes below.
  - model_name: qwen3.6-27b-quality
    litellm_params:
      model: openai/qwen3.6-27b-quality
      api_base: http://localhost:8083/v1
      api_key: sk-noop

  # Local fallback if the OpenAI-compatible local lanes are unavailable.
  - model_name: qwen3.6-27b-ollama
    litellm_params:
      model: ollama_chat/qwen3.6:27b
      api_base: http://localhost:11434

  # Also expose gpt-4o (used by financial_researcher, chart_analyst) so
  # those callsites can route through the proxy too once OPENAI_BASE_URL
  # is wired. No fallback configured here yet — these paths use vision
  # which qwen3 can't replace.
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

# When a primary model in `model_list` errors (rate-limit, 5xx, timeout),
# LiteLLM tries the next entry in this chain. The keys here are model_names
# from above; the values are ordered fallback lists.
litellm_settings:
  fallbacks:
    - gpt-5.4-mini: ["gpt-4o-mini", "qwen3.6-27b-local"]
    - gpt-4o-mini: ["qwen3.6-27b-local"]
    - qwen3.6-27b-quality: ["qwen3.6-27b-local", "qwen3.6-27b-beellama", "qwen3.6-27b-ollama"]
    - qwen3.6-27b-local: ["qwen3.6-27b-beellama", "qwen3.6-27b-ollama"]
    - qwen3.6-27b-beellama: ["qwen3.6-27b-ollama"]
    # gpt-4o has no fallback — vision can't be replaced by qwen3 text-only.

  # Retry handling — LiteLLM will retry within the same tier before falling
  # through to the next. Keep tight to avoid stacking latency on a real outage.
  num_retries: 1
  # Upstream call budget. Cloud calls return in <30s; we need this only
  # for the local qwen3.6:27b leg, which on RTX 4090 with thinking-mode
  # enabled needs 150–400s for a 4000-token study note. Set to 600 so
  # the local fallback never aborts on a real generation.
  request_timeout: 600

  # Drop unsupported params (e.g. OpenAI-only kwargs sent to ollama) rather
  # than erroring — keeps fallthrough working when JARVIS uses
  # OpenAI-specific args like `seed` or `response_format`.
  drop_params: true

# Proxy-level settings
general_settings:
  # No master key — JARVIS calls localhost-only and nothing exposes 4000
  # off-box. Add `master_key:` here if 4000 ever gets bound to a non-loopback
  # interface or behind the Cloudflare tunnel.
  store_model_in_db: false
