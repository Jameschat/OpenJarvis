# Optional Qwen BeeLlama DFlash quality profile.
#
# This is not the default Jarvis route. Use it only after the Q5_K_S target
# model is downloaded and the quality profile benchmark beats the current
# fast profile for Studio/coding tasks.

model_list:
  - model_name: qwen3.6-27b-quality
    litellm_params:
      model: openai/qwen3.6-27b-quality
      api_base: http://localhost:8083/v1
      api_key: sk-noop

  - model_name: qwen3.6-27b-local
    litellm_params:
      model: openai/qwen3.6-27b-local
      api_base: http://localhost:8082/v1
      api_key: sk-noop

  - model_name: qwen3.6-27b-ollama
    litellm_params:
      model: ollama_chat/qwen3.6:27b
      api_base: http://localhost:11434

litellm_settings:
  fallbacks:
    - qwen3.6-27b-quality: ["qwen3.6-27b-local", "qwen3.6-27b-ollama"]
    - qwen3.6-27b-local: ["qwen3.6-27b-ollama"]
  num_retries: 1
  request_timeout: 600
  drop_params: true

general_settings:
  store_model_in_db: false
