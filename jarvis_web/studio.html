<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J.A.R.V.I.S. Studio</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111113;
      --rail: #201f27;
      --panel: #17171a;
      --panel-2: #202024;
      --line: rgba(255,255,255,0.09);
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --accent: #62e6ff;
      --green: #37e583;
      --shadow: 0 18px 60px rgba(0,0,0,0.35);
      font-size: 14px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }
    button, input, textarea { font: inherit; }
    button {
      color: inherit;
      border: 0;
      cursor: pointer;
      background: transparent;
    }
    .studio-boot-screen {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #020707;
      transition: opacity 520ms ease, visibility 520ms ease;
    }
    .studio-boot-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #studio-boot-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .boot-card {
      position: relative;
      width: min(360px, calc(100vw - 42px));
      padding: 14px;
      border: 3px solid #29f5ef;
      background: #030707;
      box-shadow: 0 0 38px rgba(41,245,239,0.45), inset 0 0 0 1px rgba(41,245,239,0.35);
      text-align: center;
    }
    .boot-title {
      color: #4ffff7;
      font-size: 27px;
      letter-spacing: 0;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .boot-progress {
      height: 28px;
      border: 2px solid #29f5ef;
      padding: 3px;
    }
    .boot-progress i {
      display: block;
      height: 100%;
      width: 64%;
      background: #29f5ef;
      animation: bootFill 1.8s ease-in-out infinite alternate;
    }
    @keyframes bootFill { from { width: 32%; } to { width: 96%; } }
    #jarvis-studio-root {
      height: 100vh;
      height: 100dvh;
      display: grid;
      grid-template-columns: 304px minmax(0, 1fr) 344px;
      background: #171719;
    }
    .studio-sidebar {
      background: var(--rail);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .sidebar-top { padding: 14px 12px 10px; }
    .side-command {
      width: 100%;
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 8px;
      padding: 0 12px;
      color: #f8fafc;
      font-size: 14px;
      font-weight: 650;
    }
    .side-command:hover, .side-command.active { background: rgba(255,255,255,0.08); }
    .side-section {
      padding: 14px 12px 4px;
      color: #8b8b95;
      font-size: 12px;
    }
    .project-row, .chat-row {
      width: calc(100% - 12px);
      margin: 2px 6px;
      min-height: 31px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 0 8px;
      color: #f0f0f2;
      text-align: left;
    }
    .project-row:hover, .chat-row:hover, .chat-row.active { background: rgba(255,255,255,0.08); }
    .row-meta {
      margin-left: auto;
      color: #9ca3af;
      font-size: 11px;
    }
    .sidebar-bottom {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--line);
    }
    .studio-main {
      min-width: 0;
      min-height: 0;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 48px minmax(0, 1fr) auto;
      background: #181818;
    }
    .thread-head {
      height: 48px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 12px;
    }
    .thread-title {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .thread-head .dots { margin-left: auto; color: #aaa; }
    #studio-thread {
      overflow: auto;
      min-height: 0;
      scrollbar-gutter: stable;
      overscroll-behavior: contain;
      padding: 24px clamp(18px, 8vw, 118px) 42px;
    }
    .message {
      max-width: 880px;
      margin: 0 auto 18px;
      display: grid;
      gap: 7px;
    }
    .message.operator { justify-items: end; }
    .bubble {
      max-width: min(720px, 100%);
      border-radius: 14px;
      padding: 11px 14px;
      line-height: 1.42;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      background: #252528;
      color: #f7f7f8;
      box-shadow: var(--shadow);
    }
    .operator .bubble {
      background: #303033;
      border-top-right-radius: 6px;
    }
    .jarvis .bubble {
      background: #1d1d20;
      border: 1px solid var(--line);
      border-top-left-radius: 6px;
    }
    .jarvis.typing .bubble::after {
      content: "";
      display: inline-block;
      width: 7px;
      height: 1em;
      margin-left: 2px;
      vertical-align: -2px;
      background: #f7f7f8;
      animation: caretBlink 0.9s steps(1) infinite;
    }
    @keyframes caretBlink {
      0%, 48% { opacity: 1; }
      49%, 100% { opacity: 0; }
    }
    .thinking-indicator .bubble {
      color: #d7fbff;
      border-color: rgba(98,230,255,0.28);
      background: rgba(98,230,255,0.07);
    }
    .thinking-dots {
      display: inline-flex;
      gap: 4px;
      margin-left: 8px;
    }
    .thinking-dots i {
      width: 5px;
      height: 5px;
      border-radius: 99px;
      background: var(--cyan);
      animation: thinkingPulse 1s ease-in-out infinite;
    }
    .thinking-dots i:nth-child(2) { animation-delay: 0.16s; }
    .thinking-dots i:nth-child(3) { animation-delay: 0.32s; }
    @keyframes thinkingPulse {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }
    .message-time {
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
      padding: 0 4px;
    }
    .operator .message-time { text-align: right; }
    .run-time {
      color: var(--muted);
      font-size: 10px;
      margin-left: auto;
      white-space: nowrap;
    }
    .run-strip {
      max-width: 880px;
      margin: 0 auto 14px;
      border: 1px solid rgba(98,230,255,0.18);
      background: rgba(98,230,255,0.05);
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .run-top { display: flex; gap: 10px; align-items: center; }
    .run-status {
      color: var(--green);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .composer-wrap {
      padding: 12px clamp(18px, 8vw, 118px) 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
      background: linear-gradient(180deg, rgba(24,24,24,0.84), #181818 22%);
    }
    .composer-box {
      max-width: 880px;
      margin: 0 auto;
      border-radius: 14px;
      background: #2a2a2d;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 10px;
    }
    #studio-composer {
      width: 100%;
      min-height: 58px;
      resize: vertical;
      color: var(--text);
      background: transparent;
      border: 0;
      outline: 0;
    }
    .composer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill-btn {
      min-height: 30px;
      border-radius: 999px;
      padding: 0 12px;
      background: rgba(255,255,255,0.07);
      color: #e7e7eb;
      border: 1px solid var(--line);
    }
    .pill-btn:hover { background: rgba(255,255,255,0.12); }
    .profile-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.055);
      border: 1px solid var(--line);
    }
    .profile-btn {
      min-height: 26px;
      border-radius: 999px;
      padding: 0 10px;
      color: #cfd3dc;
      font-size: 12px;
    }
    .profile-btn.active {
      background: rgba(98,230,255,0.18);
      color: #e9fbff;
      box-shadow: inset 0 0 0 1px rgba(98,230,255,0.25);
    }
    .context-status {
      flex: 1 1 100%;
      min-height: 16px;
      color: var(--muted);
      font-size: 11px;
    }
    .context-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      max-width: 100%;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(98,230,255,0.1);
      border: 1px solid rgba(98,230,255,0.2);
      color: #d9fbff;
      font-size: 12px;
    }
    .context-chip button {
      color: inherit;
      opacity: 0.75;
    }
    .send-btn {
      margin-left: auto;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #f5f5f5;
      color: #111;
      font-weight: 800;
    }
    .studio-context {
      background: #151517;
      border-left: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto auto minmax(0,1fr);
      min-width: 0;
    }
    .context-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-box {
      margin: 10px 14px;
      border: 1px solid var(--line);
      background: #202024;
      border-radius: 10px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .search-box input {
      width: 100%;
      height: 34px;
      background: transparent;
      color: var(--text);
      border: 0;
      outline: 0;
    }
    #studio-context-panel {
      overflow: auto;
      padding: 0 14px 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .context-card {
      border: 1px solid var(--line);
      background: #1b1b1f;
      border-radius: 10px;
      padding: 10px;
    }
    .context-kicker {
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 8px;
    }
    .context-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .context-title-row .context-kicker { margin-bottom: 0; }
    .panel-count {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }
    .progress-list,
    .output-list,
    .source-list,
    .browser-list {
      display: grid;
      gap: 8px;
    }
    .progress-item {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 8px;
      align-items: start;
      color: #d7d7dc;
      font-size: 12px;
      line-height: 1.3;
    }
    .progress-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.38);
      display: grid;
      place-items: center;
      margin-top: 1px;
      color: #0f1114;
      font-size: 9px;
      font-weight: 800;
    }
    .progress-item.done .progress-dot {
      background: #c9c9cf;
      border-color: #c9c9cf;
    }
    .progress-item.active .progress-dot {
      border-color: var(--cyan);
      box-shadow: 0 0 14px rgba(98,230,255,0.35);
    }
    .progress-item.blocked .progress-dot,
    .progress-item.failed .progress-dot {
      border-color: #ff7b7b;
      background: rgba(255,123,123,0.12);
    }
    .progress-subtext {
      color: var(--muted);
      font-size: 10px;
      margin-top: 2px;
    }
    .output-row,
    .source-row,
    .browser-row {
      display: grid;
      grid-template-columns: 18px minmax(0,1fr) auto;
      gap: 8px;
      align-items: center;
      color: #dcdce2;
      font-size: 12px;
      min-width: 0;
    }
    .output-row span:nth-child(2),
    .source-row span:nth-child(2),
    .browser-row span:nth-child(2) {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .output-icon,
    .source-icon,
    .browser-icon {
      color: #e9e9ef;
      opacity: 0.9;
      text-align: center;
    }
    .subagent-stats {
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
    }
    .subagent-stats .plus { color: var(--green); }
    .subagent-stats .minus { color: #ff7b7b; }
    .context-divider {
      height: 1px;
      background: var(--line);
      margin: 4px 0;
    }
    .agent-list { display: grid; gap: 8px; }
    .agent-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 7px 8px;
      border-radius: 9px;
      font-size: 13px;
      background: rgba(255,255,255,0.035);
      border-left: 3px solid rgba(255,255,255,0.12);
    }
    .agent-qwen { border-left-color: #62e6ff; background: rgba(98,230,255,0.07); }
    .agent-codex { border-left-color: #a78bfa; background: rgba(167,139,250,0.07); }
    .agent-claude { border-left-color: #f59e0b; background: rgba(245,158,11,0.07); }
    .agent-python { border-left-color: #5ee0a1; background: rgba(94,224,161,0.07); }
    .agent-other { border-left-color: rgba(255,255,255,0.22); }
    .state-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 99px;
      background: var(--green);
      margin-right: 7px;
    }
    .mobile-menu { display: none; }
    @media (max-width: 900px) {
      body { overflow: auto; }
      #jarvis-studio-root {
        min-height: 100vh;
        height: auto;
        grid-template-columns: 1fr;
      }
      .mobile-menu {
        display: flex;
        position: sticky;
        top: 0;
        z-index: 10;
        height: 48px;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        background: #181818;
        border-bottom: 1px solid var(--line);
      }
      .studio-sidebar, .studio-context { display: none; }
      .studio-sidebar.mobile-open, .studio-context.mobile-open { display: flex; min-height: 50vh; }
      .studio-main { min-height: 100vh; grid-template-rows: 48px minmax(55vh, 1fr) auto; }
      #studio-thread, .composer-wrap { padding-left: 14px; padding-right: 14px; }
      #studio-thread { max-height: none; overflow: visible; }
    }
  </style>
</head>
<body>
  <div class="studio-boot-screen" id="studio-boot-screen" aria-label="Jarvis Studio loading">
    <canvas id="studio-boot-canvas"></canvas>
    <div class="boot-card">
      <div class="boot-title">LOADING...</div>
      <div class="boot-progress"><i></i></div>
    </div>
  </div>

  <div id="jarvis-studio-root">
    <aside class="studio-sidebar" id="studio-sidebar">
      <div class="sidebar-top">
        <button class="side-command active" type="button" data-studio-action="new-chat">New chat</button>
        <button class="side-command" type="button" data-studio-action="focus-search">Search</button>
        <button class="side-command" type="button" data-studio-action="show-plugins">Plugins</button>
        <button class="side-command" type="button" data-studio-action="show-automations">Automations <span class="row-meta" id="studio-automation-count">0</span></button>
      </div>
      <div class="side-section">Projects</div>
      <div id="studio-projects"></div>
      <div class="side-section">Chats</div>
      <div id="studio-chats"></div>
      <div class="sidebar-bottom">
        <button class="side-command" type="button" data-studio-action="open-operations">Operations Center</button>
        <button class="side-command" type="button" data-studio-action="open-settings">Settings</button>
      </div>
    </aside>

    <main class="studio-main">
      <div class="mobile-menu">
        <button class="pill-btn" type="button" data-studio-action="toggle-left">Menu</button>
        <button class="pill-btn" type="button" data-studio-action="toggle-context">Context</button>
        <strong>J.A.R.V.I.S. Studio</strong>
      </div>
      <header class="thread-head">
        <div class="thread-title" id="studio-thread-title">Jarvis local Qwen workspace</div>
        <span class="row-meta" id="studio-model-label">qwen3.6-27b-local</span>
        <button class="dots" type="button" data-studio-action="refresh-state">...</button>
      </header>
      <section id="studio-thread" aria-live="polite"></section>
      <section class="composer-wrap">
        <div class="composer-box">
          <textarea id="studio-composer" placeholder="Ask Jarvis to plan, build, test, search memory, or run a local Qwen workflow..."></textarea>
          <input id="studio-file-input" type="file" multiple hidden>
          <div id="studio-context-status" class="context-status"></div>
          <div class="composer-actions">
            <button class="pill-btn" type="button" data-studio-action="attach-context">+ Context</button>
            <button class="pill-btn" type="button" data-studio-action="toggle-approved">Default permissions</button>
            <div class="profile-toggle" aria-label="Qwen profile">
              <button class="profile-btn active" type="button" data-studio-action="set-qwen-profile" data-profile="fast">Fast</button>
              <button class="profile-btn" type="button" data-studio-action="set-qwen-profile" data-profile="quality">Quality</button>
            </div>
            <button class="send-btn" type="button" data-studio-action="send-message">↑</button>
          </div>
        </div>
      </section>
    </main>

    <aside class="studio-context" id="studio-context">
      <div class="context-head">
        <strong>Context</strong>
        <span class="row-meta" id="studio-provider-label">auto</span>
      </div>
      <div class="search-box">
        <input id="studio-search" placeholder="Search chats, runs, memory links">
      </div>
      <section id="studio-context-panel">
        <article class="context-card">
          <div class="context-title-row">
            <div class="context-kicker">Progress</div>
            <span class="panel-count" id="studio-progress-count">idle</span>
          </div>
          <div id="studio-progress-list" class="progress-list"></div>
        </article>
        <article class="context-card">
          <div class="context-title-row">
            <div class="context-kicker">Outputs</div>
            <span class="panel-count" id="studio-output-count">0</span>
          </div>
          <div id="studio-output-list" class="output-list"></div>
        </article>
        <article class="context-card">
          <div class="context-title-row">
            <div class="context-kicker">Subagents</div>
            <span class="panel-count" id="studio-subagent-count">0</span>
          </div>
          <div id="studio-agent-list" class="agent-list"></div>
        </article>
        <article class="context-card">
          <div class="context-kicker">Browser</div>
          <div id="studio-browser-list" class="browser-list"></div>
        </article>
        <article class="context-card">
          <div class="context-title-row">
            <div class="context-kicker">Runs</div>
            <span class="panel-count" id="studio-run-count">0</span>
          </div>
          <div id="studio-run-list"></div>
        </article>
        <article class="context-card">
          <div class="context-kicker">Sources</div>
          <div id="studio-source-list" class="source-list"></div>
        </article>
      </section>
    </aside>
  </div>

  <script>
    const API = {
      state: "/studio/state",
      projects: "/studio/projects",
      chats: "/studio/chats",
      runs: "/studio/runs",
      search: "/studio/search",
      chatEvents: "/chat_events",
      orchEvents: "/orch_events",
      agentTask: "/agent_task",
      schedule: "/schedule",
      vault: "/vault/summary",
      codegraph: "/codegraph/status",
      qwenProfile: "/studio/qwen-profile"
    };
    let studioState = { projects: [], chats: [], runs: [], approved: false };
    let activeProjectId = "openjarvis";
    let activeChatId = "";
    let studioRefreshTimer = null;
    let composerAttachments = [];
    const animatedMessageIds = new Set();
    let lastRenderedLatestMessageKey = "";

    function el(id) { return document.getElementById(id); }
    function clear(node) { while (node && node.firstChild) node.removeChild(node.firstChild); }
    function setText(id, value) { const node = el(id); if (node) node.textContent = value == null ? "" : String(value); }
    function formatStudioTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function typeJarvisBubble(article, bubble, text) {
      if (!article || !bubble) return;
      const content = String(text || "");
      if (!content || content.length > 1800 || window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        bubble.textContent = content;
        return;
      }
      article.classList.add("typing");
      bubble.textContent = "";
      let index = 0;
      const step = () => {
        index = Math.min(content.length, index + 3);
        bubble.textContent = content.slice(0, index);
        article.scrollIntoView({ block: "end", behavior: "instant" });
        if (index < content.length) {
          window.setTimeout(step, 12);
        } else {
          article.classList.remove("typing");
        }
      };
      step();
    }

    function agentColourClass(agent) {
      const id = String((agent && (agent.id || agent.name || agent.provider)) || "").toLowerCase();
      const provider = String((agent && agent.provider) || "").toLowerCase();
      const claudeDepartmentAgents = new Set([
        "architect",
        "backend-dev",
        "frontend-dev",
        "qa-engineer",
        "code-reviewer",
        "docs-writer",
      ]);
      if (id.includes("qwen") || provider.includes("qwen")) return "agent-qwen";
      if (id.includes("codex") || provider.includes("codex") || id.startsWith("gpt-")) return "agent-codex";
      if (id.includes("claude") || provider.includes("claude") || claudeDepartmentAgents.has(id)) return "agent-claude";
      if (provider.includes("python") || id.includes("python")) return "agent-python";
      return "agent-other";
    }

    function renderAttachments() {
      const root = el("studio-context-status");

      clear(root);
      if (!composerAttachments.length) return;
      composerAttachments.forEach((attachment, index) => {

        chip.className = "context-chip";

    function addTextContext(label, text) {
      const content = String(text || "").trim();
      if (!content) return;
      composerAttachments.push({
        type: "text",
        name: label || "Pasted text",
        content: content.slice(0, 12000)
      });
      renderAttachments();
    }

    async function addFileContext(files) {
      const usable = Array.from(files || []).slice(0, 6);
      if (!usable.length) return;
      for (const file of usable) {
        if (file.type && file.type.startsWith("image/")) {
          composerAttachments.push({
            type: "image",
            name: file.name || "image",
            content: `[image attached: ${file.name || file.type || "image"}]`
          });
        } else {
          const text = await file.text().catch(() => "");
          composerAttachments.push({
            type: "file",
            name: file.name || "file",
            content: text.slice(0, 12000)
          });
        }
      }
      renderAttachments();
    }

    function promptWithAttachments(prompt) {
      if (!composerAttachments.length) return prompt;
      const context = composerAttachments.map((item) => {
        return `### ${item.name}\n${item.content || ""}`;
      }).join("\n\n");
      return `${prompt}\n\nAttached context:\n${context}`;
    }

    function drawBootRain() {
      const canvas = el("studio-boot-canvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const glyphs = "010101101001101011001JARVISQWEN";
      let width = 0;
      let height = 0;
      let drops = [];
      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        drops = Array.from({ length: Math.ceil(width / 14) }, () => Math.random() * -height);
      }
      function tick() {
        ctx.fillStyle = "rgba(2,7,7,0.18)";
        ctx.fillRect(0, 0, width, height);
        ctx.font = "16px Consolas, monospace";
        for (let i = 0; i < drops.length; i += 1) {
          const text = glyphs[Math.floor(Math.random() * glyphs.length)];
          ctx.fillStyle = Math.random() > 0.92 ? "#e6ffff" : "#28f5e9";
          ctx.fillText(text, i * 14, drops[i]);
          drops[i] += 16;
          if (drops[i] > height + Math.random() * 220) drops[i] = Math.random() * -80;
        }
        requestAnimationFrame(tick);
      }
      resize();
      window.addEventListener("resize", resize);
      tick();
    }

    function hideBootScreen() {
      const boot = el("studio-boot-screen");
      if (boot) boot.classList.add("hidden");
    }

    async function apiGet(path) {
      const response = await fetch(path, { credentials: "same-origin" });
      if (!response.ok) throw new Error(`${path} ${response.status}`);
      return response.json();
    }

    async function apiPost(path, payload) {
      const response = await fetch(path, {
        method: "POST",
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload || {})
      });
      if (!response.ok) throw new Error(`${path} ${response.status}`);
      return response.json();
    }

    function renderThread(chat) {
      const root = el("studio-thread");
      const previousScrollTop = root.scrollTop;
      const previousScrollHeight = root.scrollHeight;
      const wasNearBottom = previousScrollHeight <= root.clientHeight + previousScrollTop + 96;
      clear(root);
      const hasThinkingRun = hasActiveRuns();
      if (!chat || !chat.messages || chat.messages.length === 0) {
        const intro = document.createElement("article");
        intro.className = "message jarvis";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = "Jarvis Studio is ready. Local Qwen handles normal planning and task runs; Claude/Codex remain escalation paths. Start a project, ask a question, or run a workflow.";
        intro.appendChild(bubble);
        root.appendChild(intro);
        return;
      }
      const latestRealMessage = [...chat.messages].reverse().find((message) => {
        const content = String(message.content || "");
        return !content.startsWith("Studio run running:");
      });
      const latestMessageKey = latestRealMessage
        ? (latestRealMessage.id || `${latestRealMessage.created_at || ""}:${String(latestRealMessage.content || "").slice(0, 40)}`)
        : "";
      const latestChanged = latestMessageKey && latestMessageKey !== lastRenderedLatestMessageKey;
      let latestArticle = null;
      chat.messages.forEach((message) => {
        const content = String(message.content || "");
        if (content.startsWith("Studio run running:")) return;
        const article = document.createElement("article");
        article.className = `message ${message.role === "operator" ? "operator" : "jarvis"}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        const messageKey = message.id || `${message.created_at || ""}:${content.slice(0, 40)}`;
        const isLatest = messageKey === latestMessageKey;
        if (message.role !== "operator" && isLatest && !animatedMessageIds.has(messageKey)) {
          animatedMessageIds.add(messageKey);
          typeJarvisBubble(article, bubble, content);
        } else {
          bubble.textContent = content;
        }
        article.appendChild(bubble);
        const messageTime = formatStudioTime(message.created_at);
        if (messageTime) {
          const stamp = document.createElement("time");
          stamp.className = "message-time";
          stamp.dateTime = message.created_at;
          stamp.textContent = messageTime;
          article.appendChild(stamp);
        }
        root.appendChild(article);
        if (isLatest) latestArticle = article;
      });
      if (hasThinkingRun) {
        const article = document.createElement("article");
        article.className = "message jarvis thinking-indicator";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.append(document.createTextNode("Jarvis is thinking"));
        const dots = document.createElement("span");
        dots.className = "thinking-dots";
        dots.setAttribute("aria-hidden", "true");
        dots.innerHTML = "<i></i><i></i><i></i>";
        bubble.appendChild(dots);
        article.appendChild(bubble);
        root.appendChild(article);
        latestArticle = article;
      }
      lastRenderedLatestMessageKey = latestMessageKey;
      if (latestChanged || hasThinkingRun || wasNearBottom) {
        root.scrollTop = root.scrollHeight;
        if (latestArticle) {
          window.requestAnimationFrame(() => {
            latestArticle.scrollIntoView({ block: "end", behavior: "instant" });
          });
        }
      } else {
        root.scrollTop = Math.max(0, previousScrollTop + root.scrollHeight - previousScrollHeight);
      }
    }

    function latestRun(runs) {
      const list = [...(runs || [])];
      return list.sort((a, b) => new Date(b.updated_at || b.created_at || 0) - new Date(a.updated_at || a.created_at || 0))[0] || null;
    }

    function runHasEvent(run, type) {
      return ((run && run.events) || []).some((event) => event.type === type);
    }

    function progressState(run, type) {
      if (!run) return "pending";
      if (type === "created") return runHasEvent(run, "run.created") ? "done" : "pending";
      if (type === "context") return runHasEvent(run, "run.context_built") ? "done" : (run.status === "running" ? "active" : "pending");
      if (type === "workflow") return runHasEvent(run, "run.workflow_selected") ? "done" : "pending";
      if (type === "research") return runHasEvent(run, "run.research_prefetched") ? "done" : "pending";
      if (type === "queued") return runHasEvent(run, "run.task_queued") ? (run.status === "running" ? "active" : "done") : "pending";
      if (type === "completed") {
        if (run.status === "failed") return "failed";
        if (run.status === "blocked") return "blocked";
        return run.status === "completed" ? "done" : "pending";
      }
      return "pending";
    }

    function renderProgressPanel(runs) {
      const root = el("studio-progress-list");
      if (!root) return;
      clear(root);
      const run = latestRun(runs);
      const steps = run ? [
        ["created", "Map request and create Studio run", run.prompt || run.id],
        ["context", "Load project, vault, memory, and CodeGraph context", "Local context pack"],
        ["workflow", "Select workflow and verification path", run.workflow || "direct"],
        ["research", "Fetch web/GitHub research when needed", runHasEvent(run, "run.research_prefetched") ? "Research attached" : "Skipped unless requested"],
        ["queued", "Route work to the Qwen agent loop", (run.task_details || [])[0]?.agent_id || "direct reply"],
        ["completed", "Return answer and sync output files", run.status || "queued"],
      ] : [
        ["created", "Waiting for your next Jarvis request", "No active Studio run yet"],
        ["context", "Context will attach automatically", "Vault, AgentMemory, CodeGraph"],
        ["workflow", "Workflow will be selected per task", "Chat, plan, research, build"],
      ];
      steps.forEach(([type, label, detail]) => {
        const state = progressState(run, type);
        const item = document.createElement("div");
        item.className = `progress-item ${state}`;
        const dot = document.createElement("span");
        dot.className = "progress-dot";
        dot.textContent = state === "done" ? "✓" : state === "failed" ? "!" : "";
        const text = document.createElement("div");
        text.append(document.createTextNode(label));
        const sub = document.createElement("div");
        sub.className = "progress-subtext";
        sub.textContent = detail || "";
        text.appendChild(sub);
        item.append(dot, text);
        root.appendChild(item);
      });
      setText("studio-progress-count", run ? (run.status || "running") : "idle");
    }

    function outputIcon(output) {
      const name = String((output && output.name) || "").toLowerCase();
      if (name.endsWith(".md")) return "▤";
      if (name.endsWith(".json")) return "{}";
      if (name.endsWith(".log")) return "≡";
      return "□";
    }

    function renderAgents(snapshot) {
      const root = el("studio-agent-list");
      clear(root);
      const agents = (snapshot && snapshot.agents) || [
        { id: "qwen-planner", provider: "qwen3.6-27b-local", status: "ready" },
        { id: "qwen-builder", provider: "qwen3.6-27b-local", status: "ready" },
        { id: "qwen-tester", provider: "qwen3.6-27b-local", status: "ready" }
      ];
      setText("studio-subagent-count", agents.length);
      const latest = latestRun(studioState.runs || []);
      const taskCounts = {};
      ((latest && latest.task_details) || []).forEach((task) => {
        const id = task.agent_id || "agent";
        taskCounts[id] = taskCounts[id] || { done: 0, failed: 0, active: 0 };
        if (task.status === "done") taskCounts[id].done += 1;
        else if (task.status === "failed") taskCounts[id].failed += 1;
        else taskCounts[id].active += 1;
      });
      agents.slice(0, 8).forEach((agent) => {
        const row = document.createElement("div");
        row.className = `agent-row ${agentColourClass(agent)}`;
        const name = document.createElement("span");
        name.textContent = agent.id || agent.name || "agent";
        const state = document.createElement("span");
        const stats = taskCounts[agent.id || agent.name || ""];
        if (stats) {
          state.className = "subagent-stats";
          const plus = document.createElement("span");
          plus.className = "plus";
          plus.textContent = `+${stats.done}`;
          const minus = document.createElement("span");
          minus.className = "minus";
          minus.textContent = `-${stats.failed}`;
          state.append(plus, document.createTextNode(" "), minus);
        } else {
          state.textContent = agent.status || agent.provider || "ready";
        }
        row.append(name, state);
        root.appendChild(row);
      });
    }

    function renderState(state) {
      studioState = { ...studioState, ...state };
      const projects = state.projects || [];
      const chats = state.chats || [];
      activeProjectId = projects[0] ? projects[0].id : activeProjectId;
      activeChatId = activeChatId || (chats[0] ? chats[0].id : "");
      renderProjects(projects);
      renderChats(chats);
      renderRuns(state.runs || []);
      renderAgents(state.orchestration || {});
      renderProgressPanel(state.runs || []);
      renderOutputsPanel(state.runs || []);
      renderBrowserPanel();
      renderSourcesPanel(state.plugins || [], state.runs || []);
      const activeChat = chats.find((chat) => chat.id === activeChatId);
      renderThread(activeChat);
      setText("studio-model-label", (state.model && state.model.alias) || "qwen3.6-27b-local");
      setText("studio-provider-label", state.provider || "auto");
      setText("studio-automation-count", (state.automations || []).length);
      renderQwenProfile(state.qwen_profile);
      scheduleStudioRefresh();
    }

    function hasActiveRuns() {
      return (studioState.runs || []).some((run) => ["queued", "running"].includes(run.status));
    }

    function scheduleStudioRefresh() {
      if (studioRefreshTimer) {
        clearTimeout(studioRefreshTimer);
        studioRefreshTimer = null;
      }
      if (!hasActiveRuns()) return;
      studioRefreshTimer = setTimeout(scheduleStudioRefreshTick, 3500);
    }

    async function scheduleStudioRefreshTick() {
      studioRefreshTimer = null;
      await loadStudioState();
    }

    async function loadStudioState() {
      try {
        const state = await apiGet(API.state);
        renderState(state);
      } catch (error) {
        const root = el("studio-thread");
        clear(root);
        const article = document.createElement("article");
        article.className = "message jarvis";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = `Studio state failed to load: ${error.message}`;
        article.appendChild(bubble);
        root.appendChild(article);
      } finally {
        setTimeout(hideBootScreen, 450);
      }
    }

    async function sendComposer() {
      const composer = el("studio-composer");
      const prompt = (composer.value || "").trim();
      if (!prompt) return;
      composer.value = "";
      const submittedPrompt = promptWithAttachments(prompt);
      composerAttachments = [];
      renderAttachments();
      const optimistic = {
        ...studioState,
        runs: [{ status: "running", prompt, created_at: new Date().toISOString() }, ...(studioState.runs || [])],
        chats: [{
          id: activeChatId || "pending",
          title: "Current session",
          messages: [{ role: "operator", content: prompt, created_at: new Date().toISOString() }]
        }]
      };
      renderState(optimistic);
      const result = await apiPost(API.runs, {
        project_id: activeProjectId,
        chat_id: activeChatId,
        prompt: submittedPrompt,
        approved: studioState.approved
      });
      activeChatId = result.run && result.run.chat_id ? result.run.chat_id : activeChatId;
      await loadStudioState();
    }

    async function createChat() {
      const result = await apiPost(API.chats, { project_id: activeProjectId, title: "New chat" });
      activeChatId = result.chat.id;
      await loadStudioState();
    }

    async function searchStudio() {
      const query = el("studio-search").value || "";
      if (!query.trim()) return loadStudioState();
      const result = await apiGet(`${API.search}?q=${encodeURIComponent(query)}`);
      const root = el("studio-run-list");
      clear(root);
      (result.results || []).forEach((item) => {
        const row = document.createElement("div");
        row.className = "agent-row";
        const title = document.createElement("span");
        title.textContent = item.title || item.snippet || item.type;
        const type = document.createElement("span");
        type.textContent = item.type;
        row.append(title, type);
        root.appendChild(row);
      });
    }

    async function setQwenProfile(profile) {
      const result = await apiPost(API.qwenProfile, { profile });
      studioState.qwen_profile = result;
      renderQwenProfile(result);
    }

    document.addEventListener('click', async (event) => {
      const target = event.target.closest('[data-studio-action]');
      if (!target) return;
      const action = target.dataset.studioAction;
      try {
        if (action === "new-chat") await createChat();
        if (action === "focus-search") el("studio-search").focus();
        if (action === "show-plugins") renderSourcesPanel((await apiGet("/studio/plugins")).plugins || [], studioState.runs || []);
        if (action === "show-automations") renderRuns((await apiGet("/studio/automations")).automations || []);
        if (action === "open-operations") window.location.href = "/brain";
        if (action === "open-settings") window.location.href = "/brain#settings";
        if (action === "select-project") { activeProjectId = target.dataset.projectId; activeChatId = ""; await loadStudioState(); }
        if (action === "select-chat") { activeChatId = target.dataset.chatId; renderState(studioState); }
        if (action === "refresh-state") await loadStudioState();
        if (action === "toggle-left") el("studio-sidebar").classList.toggle("mobile-open");
        if (action === "toggle-context") el("studio-context").classList.toggle("mobile-open");
        if (action === "attach-context") el("studio-file-input").click();
        if (action === "set-qwen-profile") await setQwenProfile(target.dataset.profile || "fast");
        if (action === "toggle-approved") { studioState.approved = !studioState.approved; target.textContent = studioState.approved ? "Approved run" : "Default permissions"; }
        if (action === "open-agent-list") renderAgents(studioState.orchestration || {});
        if (action === "send-message") await sendComposer();
      } catch (error) {
        console.error(error);
      }
    });

    el("studio-search").addEventListener("keydown", (event) => {
      if (event.key === "Enter") searchStudio();
    });
    el("studio-composer").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.metaKey || event.ctrlKey)) sendComposer();
    });
    el("studio-composer").addEventListener("paste", (event) => {
      const files = event.clipboardData && event.clipboardData.files;
      if (files && files.length) {
        addFileContext(files);
        return;
      }
      const text = event.clipboardData && event.clipboardData.getData("text");
      if (text && text.length > 1200) {
        event.preventDefault();
        addTextContext("Pasted text", text);
      }
    });
    el("studio-composer").addEventListener("drop", (event) => {
      event.preventDefault();
      addFileContext(event.dataTransfer && event.dataTransfer.files);
    });
    el("studio-composer").addEventListener("dragover", (event) => event.preventDefault());
    el("studio-file-input").addEventListener("change", (event) => {
      addFileContext(event.target.files);
      event.target.value = "";
    });
    drawBootRain();
    loadStudioState();
  </script>
</body>
</html>
